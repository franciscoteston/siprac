{% load static crispy_forms_tags %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — SIPRAC</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="{% static 'css/siprac.css' %}">
</head>
<body>
  <div class="siprac-login-page">
    <div class="card siprac-login-card">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <p class="siprac-login-logo mb-1">Receita <span>Municipal</span></p>
          <h1 class="siprac-login-title mb-1">SIPRAC</h1>
          <p class="siprac-login-subtitle mb-0">Divisão de Avaliação de Imóveis — DAI</p>
        </div>

        {% if form.errors %}
        <div class="alert alert-danger py-2" role="alert">
          Usuário ou senha inválidos. Tente novamente.
        </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
          {% csrf_token %}
          {{ form|crispy }}
          <input type="hidden" name="next" value="{{ next }}">
          <button type="submit" class="btn btn-primary siprac-btn-primary w-100 mt-2">
            Entrar
          </button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
